name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install cython setuptools && pip install -e .

      - name: Run tests
        run: python -m unittest discover -s src/tests -p "*Tests.py" -v

  benchmarks:
    name: Benchmarks (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install cython setuptools pyperf lzstring && pip install -e .

      - name: Verify Cython extensions are loaded
        run: |
          python - <<'EOF'
          import importlib, pathlib
          for mod in ("lzstr.BitString", "lzstr.LZString", "lzstr.Exceptions"):
              m = importlib.import_module(mod)
              f = pathlib.Path(m.__file__)
              assert f.suffix in (".so", ".pyd"), f"{mod} loaded from {f} — expected a compiled extension!"
              print(f"OK: {mod} -> {f}")
          EOF

      - name: Run benchmarks (both suites)
        run: python benchmarks.py --fast -o results.json

      - name: Compare lzstr vs lzstring
        run: |
          python - <<'EOF'
          import json, statistics, sys

          data = json.load(open("results.json"))
          by_name = {b["metadata"]["name"]: b for b in data["benchmarks"]}

          def mean_us(bench: dict) -> float | None:
              vals: list[float] = []
              for run in bench.get("runs", []):
                  vals.extend(run.get("values", []))
              return statistics.mean(vals) * 1e6 if vals else None

          header = f"{'Benchmark':<45} {'lzstring':>12} {'lzstr':>12} {'speedup':>10}"
          print(header)
          print("-" * len(header))

          slower: list[str] = []
          for name, bench in sorted(by_name.items()):
              if not name.startswith("lzstring."):
                  continue
              lzstr_name = name.replace("lzstring.", "lzstr.", 1)
              if lzstr_name not in by_name:
                  continue
              ref_us = mean_us(bench)
              cand_us = mean_us(by_name[lzstr_name])
              if ref_us is None or cand_us is None:
                  continue
              speedup = ref_us / cand_us
              label = name.removeprefix("lzstring.")
              flag = "  <-- SLOWER" if speedup < 1.0 else ""
              print(f"{label:<45} {ref_us:>10.1f}us {cand_us:>10.1f}us {speedup:>8.2f}x{flag}")
              if speedup < 1.0:
                  slower.append(label)

          if slower:
              print(f"\nWARNING: lzstr is slower than lzstring on: {', '.join(slower)}", file=sys.stderr)
              sys.exit(1)
          else:
              print("\nlzstr is faster than lzstring on all measured benchmarks.")
          EOF

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-${{ matrix.python-version }}
          path: results.json
